<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reggie's Beans AI Pipeline</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 600; color: #fff; }
header span { font-size: 13px; color: #666; }
.container { max-width: 960px; margin: 0 auto; padding: 24px; }

/* Run list */
.runs-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
.run-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
.run-card:hover { border-color: #555; }
.run-card .run-id { font-size: 12px; color: #666; font-family: monospace; }
.run-card .run-meta { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
.run-card .run-status { font-size: 13px; font-weight: 600; }
.run-card .run-date { font-size: 12px; color: #666; }

/* Status colors */
.status-running { color: #60a5fa; }
.status-waitingforinput { color: #fbbf24; }
.status-completed { color: #34d399; }
.status-failed { color: #f87171; }
.status-created { color: #a78bfa; }
.status-cancelled { color: #9ca3af; }

/* Stage list */
.pipeline { display: flex; flex-direction: column; gap: 4px; margin-top: 20px; }
.stage-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border-radius: 6px; background: #1a1a1a; border: 1px solid #2a2a2a; }
.stage-row.stage-running { border-color: #1d4ed8; background: #0f1a2e; }
.stage-row.stage-completed { border-color: #065f46; background: #061a12; }
.stage-row.stage-failed { border-color: #7f1d1d; background: #1a0b0b; }
.stage-row.stage-waitingforinput { border-color: #78350f; background: #1a1005; }
.stage-row.stage-pending { opacity: 0.5; }
.stage-row.stage-skipped { opacity: 0.4; }

.stage-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; margin-top: 1px; }
.stage-body { flex: 1; min-width: 0; }
.stage-name { font-size: 14px; font-weight: 500; }
.stage-id { font-size: 11px; color: #555; font-family: monospace; }
.stage-meta { font-size: 12px; color: #666; margin-top: 2px; }
.stage-summary { margin-top: 8px; font-size: 13px; color: #a0a0a0; line-height: 1.5; background: #111; border-radius: 4px; padding: 8px 10px; }
.stage-error { margin-top: 8px; font-size: 13px; color: #f87171; background: #1a0b0b; border-radius: 4px; padding: 8px 10px; }

/* Action panel */
.action-panel { margin-top: 24px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; }
.action-panel h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #fff; }
.btn { display: inline-block; padding: 9px 18px; border-radius: 6px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-success { background: #10b981; color: #fff; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-neutral { background: #374151; color: #e0e0e0; }
.btn-warning { background: #f59e0b; color: #000; }

/* Forms */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; color: #999; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 10px; border-radius: 5px;
  background: #111; border: 1px solid #333; color: #e0e0e0; font-size: 14px;
  font-family: inherit;
}
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: #3b82f6;
}

/* New run form */
.new-run-panel { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
.new-run-panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

/* Opportunity cards */
.opportunity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin: 12px 0; }
.opportunity-card { background: #111; border: 2px solid #2a2a2a; border-radius: 6px; padding: 12px; cursor: pointer; transition: border-color 0.15s; }
.opportunity-card:hover { border-color: #555; }
.opportunity-card.selected { border-color: #3b82f6; }
.opportunity-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.opportunity-card p { font-size: 12px; color: #888; line-height: 1.4; }

/* Live indicator */
.live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #60a5fa; margin-right: 6px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Spinner */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Back link */
.back-link { color: #3b82f6; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 20px; }
.back-link:hover { text-decoration: underline; }

/* JSON viewer */
.json-toggle { font-size: 12px; color: #3b82f6; cursor: pointer; margin-top: 6px; display: inline-block; }
.json-block { margin-top: 6px; background: #0d0d0d; border: 1px solid #222; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 11px; color: #9ca3af; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; display: none; }

/* Tabs */
.tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 1px solid #2a2a2a; }
.tab { padding: 8px 16px; font-size: 14px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #fff; border-bottom-color: #3b82f6; }

.section-title { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; margin-top: 24px; }
</style>
</head>
<body>
<header>
  <h1>Reggie's Beans AI Pipeline</h1>
  <span id="header-status">Loading...</span>
</header>
<div class="container" id="app">
  <div style="padding:40px;text-align:center;color:#666;">Loading...</div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let currentRunId = null;
let eventSource = null;
let workflowDef = null;

// ── Boot ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    workflowDef = await api('/api/workflow');
    await showRunList();
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<div style="padding:40px;color:#f87171;">
        <strong>Failed to connect to API</strong><br>
        <code style="font-size:12px;">${escHtml(String(err))}</code><br><br>
        Make sure the server is running and refresh the page.
      </div>`;
    document.getElementById('header-status').textContent = 'Error';
  }
})();

// ── API helpers ───────────────────────────────────────────────────────────
async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (res.status === 204 || res.status === 202) return null;
  if (!res.ok) { const t = await res.text(); throw new Error(t || res.statusText); }
  return res.json().catch(() => null);
}

// ── Views ─────────────────────────────────────────────────────────────────
async function showRunList() {
  disconnectSse();
  currentRunId = null;
  document.getElementById('header-status').textContent = 'Dashboard';

  const runs = (await api('/api/runs')) ?? [];

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="new-run-panel">
      <h2>Start New Pipeline Run</h2>
      <div class="form-group">
        <label>Area of interest</label>
        <input id="area" type="text" placeholder="e.g. developer tools, healthcare, fintech" />
      </div>
      <div class="form-group">
        <label>Signal sources (optional, comma-separated)</label>
        <input id="sources" type="text" placeholder="e.g. Reddit, HackerNews, ProductHunt" />
      </div>
      <button class="btn btn-primary" onclick="startRun()">Start Pipeline</button>
    </div>

    <div class="section-title">Previous Runs</div>
    <div class="runs-list" id="runs-list">
      ${runs.length === 0 ? '<div style="color:#555;font-size:14px;">No runs yet.</div>' : ''}
      ${runs.map(r => `
        <div class="run-card" onclick="showRun('${r.runId}')">
          <div class="run-id">${r.runId}</div>
          <div class="run-meta">
            <span class="run-status status-${r.status.toLowerCase()}">${statusEmoji(r.status)} ${r.status}</span>
            <span class="run-date">${fmtDate(r.createdAt)}</span>
            <span style="font-size:12px;color:#555;">${completedStages(r)} / ${r.stages.length} stages</span>
          </div>
        </div>`).join('')}
    </div>
  `;
}

async function startRun() {
  const area = document.getElementById('area').value.trim();
  if (!area) { alert('Please enter an area of interest.'); return; }
  const sourcesRaw = document.getElementById('sources').value.trim();
  const sources = sourcesRaw ? sourcesRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

  await api('/api/runs/start', 'POST', { areaOfInterest: area, signalSources: sources });

  // Engine creates + saves the run before executing any stage (~100ms).
  // Poll once after a short delay to find the new run ID.
  await sleep(800);
  const runs = await api('/api/runs');
  if (runs && runs.length > 0) {
    showRun(runs[0].runId);   // newest first
  }
}

async function showRun(runId) {
  disconnectSse();
  currentRunId = runId;

  const run = await api(`/api/runs/${runId}`);
  if (!run) { alert('Run not found'); return; }

  renderRun(run);
  connectSse(runId);
}

function renderRun(run) {
  const app = document.getElementById('app');
  const isLive = run.status === 'Running' || run.status === 'WaitingForInput' || run.status === 'Created';
  const liveIndicator = isLive ? '<span class="live-dot"></span>' : '';

  document.getElementById('header-status').innerHTML =
    `${liveIndicator}${statusEmoji(run.status)} ${run.status}`;

  let stagesHtml = run.stages.map((s, i) => renderStageRow(s, i, run)).join('');

  let actionHtml = '';
  if (run.status === 'WaitingForInput') {
    actionHtml = renderActionPanel(run);
  } else if (run.status === 'Failed') {
    actionHtml = `
      <div class="action-panel">
        <h3>Pipeline Failed</h3>
        <p style="color:#f87171;font-size:14px;margin-bottom:14px;">
          Stage <strong>${run.stages[run.currentStageIndex]?.stageId}</strong> failed.
          Click Retry to re-run from the failed stage.
        </p>
        <button class="btn btn-warning" onclick="retryRun('${run.runId}')">Retry from Failed Stage</button>
      </div>`;
  } else if (run.status === 'Completed') {
    actionHtml = `
      <div class="action-panel" style="border-color:#065f46;background:#061a12;">
        <h3 style="color:#34d399;">Pipeline Complete</h3>
        <p style="font-size:14px;color:#9ca3af;margin-top:4px;">All ${run.stages.length} stages completed successfully.</p>
      </div>`;
  }

  app.innerHTML = `
    <div class="back-link" onclick="showRunList()">← All runs</div>
    <div style="font-family:monospace;font-size:12px;color:#555;margin-bottom:8px;">${run.runId}</div>
    <div style="font-size:13px;color:#888;margin-bottom:4px;">Started ${fmtDate(run.createdAt)}</div>
    <div class="pipeline">${stagesHtml}</div>
    ${actionHtml}
  `;
}

function renderStageRow(stage, index, run) {
  const isPausedHere = run.status === 'WaitingForInput' && run.currentStageIndex === index;
  const statusClass = isPausedHere ? 'stage-waitingforinput' : `stage-${stage.status.toLowerCase()}`;
  const icon = stageIcon(stage.status, isPausedHere);
  const duration = stage.startedAt && stage.completedAt
    ? `${((new Date(stage.completedAt) - new Date(stage.startedAt)) / 1000).toFixed(1)}s`
    : stage.startedAt && stage.status === 'Running'
    ? `<span class="spinner"></span> running`
    : '';

  const attempts = stage.attemptCount > 1 ? ` · ${stage.attemptCount} attempts` : '';
  const meta = [duration, attempts ? attempts.trim() : ''].filter(Boolean).join(' ');

  let summaryHtml = '';
  if (stage.status === 'Completed' && stage.outputJson) {
    const summary = getStageSummary(stage.stageId, stage.outputJson);
    const jsonId = `json-${index}`;
    summaryHtml = `
      <div class="stage-summary">${summary}</div>
      <span class="json-toggle" onclick="toggleJson('${jsonId}')">View raw JSON</span>
      <pre class="json-block" id="${jsonId}">${escHtml(fmtJson(stage.outputJson))}</pre>`;
  } else if (stage.status === 'Failed' && stage.error) {
    summaryHtml = `<div class="stage-error">${escHtml(stage.error)}</div>`;
  } else if (isPausedHere) {
    summaryHtml = `<div class="stage-summary" style="color:#fbbf24;">Paused — awaiting your input below.</div>`;
  } else if (stage.status === 'Running') {
    summaryHtml = `<div class="stage-summary" style="color:#60a5fa;">Running… checking in via SSE.</div>`;
  }

  return `
    <div class="stage-row ${statusClass}">
      <div class="stage-icon">${icon}</div>
      <div class="stage-body">
        <div class="stage-name">${workflowDef?.stages[index]?.name ?? stage.stageId}</div>
        <div class="stage-id">${stage.stageId}</div>
        ${meta ? `<div class="stage-meta">${meta}</div>` : ''}
        ${summaryHtml}
      </div>
    </div>`;
}

function renderActionPanel(run) {
  const stageIndex = run.currentStageIndex;
  const stage = run.stages[stageIndex];
  const stageId = stage.stageId;
  const stageName = workflowDef?.stages[stageIndex]?.name ?? stageId;
  const inputJson = stage.inputJson ?? '{}';

  // Special human-input stages need custom forms
  if (stageId === 'opportunity-selection') {
    return renderOpportunitySelectionPanel(run, inputJson);
  }
  if (stageId === 'human-review') {
    return renderHumanReviewPanel(run, inputJson);
  }

  // All other stages: review-only, just show Continue
  const prevStageIndex = stageIndex - 1;
  const prevStage = prevStageIndex >= 0 ? run.stages[prevStageIndex] : null;
  const prevStageName = prevStage ? (workflowDef?.stages[prevStageIndex]?.name ?? prevStage.stageId) : '';

  return `
    <div class="action-panel">
      <h3>Review: ${prevStageName || stageName}</h3>
      <p style="font-size:13px;color:#9ca3af;margin-bottom:16px;">
        ${prevStage ? `<strong>${prevStageName}</strong> completed.` : ''}
        Ready to run <strong>${stageName}</strong>.
      </p>
      <button class="btn btn-success" onclick="continueRun('${run.runId}', null)">
        Continue to ${stageName} →
      </button>
      <button class="btn btn-neutral" style="margin-left:8px;" onclick="showRunList()">
        Stop for now
      </button>
    </div>`;
}

function renderOpportunitySelectionPanel(run, inputJson) {
  let opportunities = [];
  let trends = [];
  try {
    const parsed = JSON.parse(inputJson);
    opportunities = parsed.opportunityProfiles ?? [];
    trends = parsed.trends ?? [];
  } catch {}

  const cards = opportunities.map((o, i) => `
    <div class="opportunity-card" id="opp-${i}" onclick="selectOpportunity(${i})">
      <h4>${escHtml(o.title ?? o.productArea ?? `Option ${i+1}`)}</h4>
      <p>${escHtml(o.description ?? o.coreProblem ?? '')}</p>
    </div>`).join('');

  return `
    <div class="action-panel">
      <h3>Opportunity Selection</h3>
      <p style="font-size:13px;color:#9ca3af;margin-bottom:16px;">
        Select an opportunity to build a product around, or enter your own idea below.
      </p>
      <div class="opportunity-grid">${cards}</div>
      <div class="section-title" style="margin-top:16px;">Or enter a custom direction</div>
      <div class="form-group">
        <label>Target domain</label>
        <input id="sel-domain" type="text" placeholder="e.g. developer tooling" />
      </div>
      <div class="form-group">
        <label>Target audience</label>
        <input id="sel-audience" type="text" placeholder="e.g. indie hackers" />
      </div>
      <div class="form-group">
        <label>Key themes (comma-separated)</label>
        <input id="sel-themes" type="text" placeholder="e.g. AI, automation, productivity" />
      </div>
      <button class="btn btn-success" onclick="submitOpportunitySelection('${run.runId}')">
        Proceed with Selection →
      </button>
    </div>`;
}

let selectedOpportunityIndex = null;
function selectOpportunity(i) {
  document.querySelectorAll('.opportunity-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById(`opp-${i}`);
  if (card) card.classList.add('selected');
  selectedOpportunityIndex = i;
}

async function submitOpportunitySelection(runId) {
  const run = await api(`/api/runs/${runId}`);
  const inputJson = run.stages[run.currentStageIndex].inputJson ?? '{}';
  let input;
  try { input = JSON.parse(inputJson); } catch { input = {}; }
  const opportunities = input.opportunityProfiles ?? [];

  let domain = document.getElementById('sel-domain').value.trim();
  let audience = document.getElementById('sel-audience').value.trim();
  let themesRaw = document.getElementById('sel-themes').value.trim();
  let themes = themesRaw ? themesRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

  // If user selected a card, prefill from it
  if (selectedOpportunityIndex !== null && opportunities[selectedOpportunityIndex]) {
    const opp = opportunities[selectedOpportunityIndex];
    if (!domain) domain = opp.productArea ?? opp.title ?? '';
    if (!audience) audience = opp.targetAudience ?? '';
    if (themes.length === 0) themes = opp.themes ?? opp.keyThemes ?? [];
  }

  if (!domain) { alert('Please select an opportunity or enter a domain.'); return; }

  // Construct IdeationInput JSON (matching the contract)
  const ideationInput = {
    targetDomain: domain,
    targetAudience: audience,
    keyThemes: themes,
    rejectedIdeas: []
  };

  await continueRun(runId, JSON.stringify(ideationInput));
}

function renderHumanReviewPanel(run, inputJson) {
  let pkg = {};
  try { pkg = JSON.parse(inputJson); } catch {}

  return `
    <div class="action-panel">
      <h3>Final Human Review & Approval</h3>
      <p style="font-size:13px;color:#9ca3af;margin-bottom:16px;">
        Review the deployment package and approve or reject.
      </p>
      <div class="form-group">
        <label>Feedback (optional)</label>
        <textarea id="review-feedback" placeholder="Any comments or suggestions..."></textarea>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-success" onclick="submitHumanReview('${run.runId}', 'approved')">
          Approve & Deploy
        </button>
        <button class="btn btn-danger" onclick="submitHumanReview('${run.runId}', 'rejected')">
          Reject
        </button>
      </div>
    </div>`;
}

async function submitHumanReview(runId, decision) {
  const feedback = document.getElementById('review-feedback')?.value?.trim() ?? '';
  const approval = { decision, feedback: feedback || null, revisitStep: null };
  await continueRun(runId, JSON.stringify(approval));
}

// ── SSE ───────────────────────────────────────────────────────────────────
function connectSse(runId) {
  disconnectSse();
  eventSource = new EventSource(`/api/runs/${runId}/events`);
  eventSource.onmessage = async (e) => {
    const event = JSON.parse(e.data);
    // Re-fetch and re-render the run on every event
    const run = await api(`/api/runs/${runId}`);
    if (run && currentRunId === runId) renderRun(run);

    // If terminal event, disconnect SSE
    if (event.type === 'run-completed' || event.type === 'run-failed') {
      disconnectSse();
    }
  };
  eventSource.onerror = () => {
    // SSE closed (run completed / server restarted) — stop reconnecting
    disconnectSse();
  };
}

function disconnectSse() {
  if (eventSource) { eventSource.close(); eventSource = null; }
}

// ── Actions ───────────────────────────────────────────────────────────────
async function continueRun(runId, inputJson) {
  await api(`/api/runs/${runId}/continue`, 'POST', { inputJson });
  // Re-render immediately with updated state (SSE will keep updating)
  await sleep(300);
  const run = await api(`/api/runs/${runId}`);
  if (run && currentRunId === runId) renderRun(run);
}

async function retryRun(runId) {
  await api(`/api/runs/${runId}/retry`, 'POST');
  await sleep(300);
  const run = await api(`/api/runs/${runId}`);
  if (run && currentRunId === runId) renderRun(run);
}

function toggleJson(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── Stage summaries ───────────────────────────────────────────────────────
function getStageSummary(stageId, outputJsonStr) {
  try {
    const o = JSON.parse(outputJsonStr);
    switch (stageId) {
      case 'trend-discovery': {
        const trends = o.trends ?? [];
        const opps = o.opportunityProfiles ?? [];
        return `Found <strong>${trends.length}</strong> trends · <strong>${opps.length}</strong> opportunity profiles`;
      }
      case 'opportunity-selection': {
        return `Domain: <strong>${escHtml(o.targetDomain ?? '—')}</strong> · Audience: <strong>${escHtml(o.targetAudience ?? '—')}</strong>`;
      }
      case 'idea-generation': {
        const ideas = o.ideas ?? [];
        return ideas.slice(0, 3).map(i => `• ${escHtml(i.title ?? i.name ?? JSON.stringify(i))}`).join('<br>') +
          (ideas.length > 3 ? `<br><span style="color:#666">+ ${ideas.length - 3} more</span>` : '');
      }
      case 'idea-evaluation': {
        const ideas = o.rankedIdeas ?? o.evaluatedIdeas ?? [];
        return ideas.slice(0, 3).map(i =>
          `• <strong>${escHtml(i.title ?? i.name ?? '?')}</strong> — score: ${i.totalScore ?? i.score ?? '?'}`
        ).join('<br>');
      }
      case 'market-analysis': {
        const size = o.marketSize ?? o.estimatedMarketSize ?? '?';
        const comp = o.competitiveLandscape ?? o.competitorCount ?? '?';
        return `Market size: <strong>${escHtml(String(size))}</strong> · Competitive landscape: ${escHtml(String(comp))}`;
      }
      case 'tech-feasibility': {
        const score = o.feasibilityScore ?? o.score ?? '?';
        const risks = (o.risks ?? o.technicalRisks ?? []).slice(0, 2).map(r => escHtml(r.title ?? r.risk ?? String(r))).join(', ');
        return `Feasibility score: <strong>${score}</strong>${risks ? ` · Risks: ${risks}` : ''}`;
      }
      case 'go-no-go': {
        const dec = o.decision ?? '?';
        const conf = o.confidence ?? o.confidenceLevel ?? '';
        const color = dec.toLowerCase() === 'go' ? '#34d399' : '#f87171';
        return `Decision: <strong style="color:${color}">${escHtml(String(dec).toUpperCase())}</strong>${conf ? ` · Confidence: ${escHtml(String(conf))}` : ''}`;
      }
      case 'product-planning': {
        const features = o.mvpFeatures ?? o.coreFeatures ?? [];
        return `<strong>${escHtml(o.productName ?? o.vision?.productName ?? 'Product')}</strong> · ${features.length} MVP features`;
      }
      case 'architecture-design': {
        const comps = o.components ?? o.services ?? [];
        return `<strong>${o.architectureStyle ?? o.pattern ?? 'Architecture'}</strong> · ${comps.length} components`;
      }
      case 'backlog-generation': {
        const sprints = o.sprints ?? [];
        const stories = sprints.reduce((n, s) => n + (s.userStories ?? s.stories ?? []).length, 0);
        return `<strong>${sprints.length}</strong> sprints · <strong>${stories}</strong> user stories`;
      }
      case 'code-generation': {
        const files = o.generatedFiles ?? [];
        return `<strong>${files.length}</strong> files generated`;
      }
      case 'frontend-generation': {
        const files = (o.generatedFiles ?? o.frontendFiles ?? []).length;
        return `<strong>${files}</strong> frontend files generated`;
      }
      case 'full-stack-review':
        return 'Full-stack review passed.';
      case 'automated-testing': {
        const pass = o.passedTests ?? o.passed ?? '?';
        const fail = o.failedTests ?? o.failed ?? '?';
        const cov = o.coverage ?? o.codeCoverage ?? '';
        return `Passed: <strong style="color:#34d399">${pass}</strong> · Failed: <strong style="color:#f87171">${fail}</strong>${cov ? ` · Coverage: ${cov}` : ''}`;
      }
      case 'code-review': {
        const rating = o.overallRating ?? o.rating ?? '?';
        const issues = (o.issues ?? o.findings ?? []).length;
        return `Rating: <strong>${escHtml(String(rating))}</strong> · ${issues} issues found`;
      }
      case 'deployment-prep': {
        const files = (o.deploymentFiles ?? o.files ?? []).length;
        return `<strong>${files}</strong> deployment files prepared`;
      }
      case 'human-review': {
        const dec = o.decision ?? '?';
        const color = dec.toLowerCase() === 'approved' ? '#34d399' : '#f87171';
        return `Decision: <strong style="color:${color}">${escHtml(dec)}</strong>`;
      }
      default:
        return `<span style="color:#666">Completed</span>`;
    }
  } catch {
    return '<span style="color:#666">Completed</span>';
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────
function statusEmoji(status) {
  switch (status?.toLowerCase()) {
    case 'running': return '⚡';
    case 'waitingforinput': return '⏸';
    case 'completed': return '✅';
    case 'failed': return '❌';
    case 'created': return '🆕';
    case 'skipped': return '⏭';
    case 'pending': return '○';
    default: return '•';
  }
}

function stageIcon(status, isPaused) {
  if (isPaused) return '⏸';
  switch (status?.toLowerCase()) {
    case 'running': return '<span class="spinner"></span>';
    case 'completed': return '✅';
    case 'failed': return '❌';
    case 'skipped': return '⏭';
    default: return '○';
  }
}

function completedStages(run) {
  return (run.stages ?? []).filter(s => s.status === 'Completed').length;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function fmtJson(str) {
  try { return JSON.stringify(JSON.parse(str), null, 2); } catch { return str; }
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
